<style>:root { color-scheme: light; }</style>

<style>
* { margin:0; padding:0; box-sizing:border-box; }
:root {
  --red: #C8102E; --blue: #002868; --gold: #C9973B;
  --teal: #007B6E; --bg: #F2F4F8; --white: #FFFFFF;
  --text: #1A1A2E; --muted: #6B7280; --border: #E0E4EC;
}
body { font-family: 'Segoe UI', system-ui, sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; padding-bottom: 40px; }

.header { background: linear-gradient(135deg, var(--red) 0%, #7B0A1E 40%, var(--blue) 100%); padding: 18px 24px; display: flex; align-items: center; gap: 14px; box-shadow: 0 3px 14px rgba(0,0,0,0.25); position: relative; overflow: hidden; }
.header::after { content:''; position:absolute; inset:0; background:repeating-linear-gradient(45deg,transparent,transparent 18px,rgba(255,255,255,0.03) 18px,rgba(255,255,255,0.03) 36px); }
.header-icon { font-size: 2.2rem; z-index:1; }
.header-info { z-index:1; flex:1; }
.header-title { font-size: 1.35rem; font-weight: 700; color: #fff; }
.header-sub { font-size: 0.75rem; color: rgba(255,255,255,0.75); margin-top: 2px; }
.header-right { z-index:1; text-align:right; }
.update-time { font-size: 0.7rem; color: rgba(255,255,255,0.65); margin-bottom: 6px; }
.refresh-btn { background:rgba(255,255,255,0.18); border:1px solid rgba(255,255,255,0.35); color:#fff; padding:5px 14px; border-radius:20px; cursor:pointer; font-size:0.78rem; font-family:inherit; transition:background 0.2s; }
.refresh-btn:hover { background:rgba(255,255,255,0.3); }
.refresh-btn:disabled { opacity:0.5; cursor:default; }

.tabs-wrapper { padding: 20px 24px 0; display: flex; gap: 4px; }
.tab { display:flex; align-items:center; gap:8px; padding:10px 20px; border-radius:10px 10px 0 0; cursor:pointer; font-size:0.82rem; font-weight:600; background:var(--white); border:1px solid var(--border); border-bottom:none; color:var(--muted); transition:all 0.2s; }
.tab.active-base   { color:var(--gold); border-top:3px solid var(--gold); }
.tab.active-conservadora { color:var(--teal); border-top:3px solid var(--teal); }
.tab.active-riesgo { color:var(--red); border-top:3px solid var(--red); }
.tab-pts { font-size:0.7rem; font-weight:700; padding:2px 8px; border-radius:10px; background:var(--bg); color:var(--muted); }
.tab.active-base .tab-pts { background:#FDF4E3; color:var(--gold); }
.tab.active-conservadora .tab-pts { background:#E6F4F2; color:var(--teal); }
.tab.active-riesgo .tab-pts { background:#FDEDF0; color:var(--red); }

.panel { display:none; margin:0 24px 24px; background:var(--white); border:1px solid var(--border); border-radius:0 12px 12px 12px; padding:24px; box-shadow:0 2px 12px rgba(0,0,0,0.06); }
.panel.active { display:block; }

.stats-row { display:grid; grid-template-columns:1fr 1fr; gap:16px; margin-bottom:20px; }
.stat-card { background:var(--bg); border-radius:12px; padding:18px 20px; border-left:4px solid transparent; }
.stat-card.card-pts { border-left-color:var(--gold); }
.stat-card.card-pct { border-left-color:#1D6EA3; }
.stat-label { font-size:0.7rem; font-weight:600; letter-spacing:0.5px; text-transform:uppercase; color:var(--muted); margin-bottom:8px; }
.stat-value { font-size:2rem; font-weight:800; line-height:1; }
.stat-value .unit { font-size:0.95rem; font-weight:400; color:var(--muted); }
.stat-sub { font-size:0.72rem; color:var(--muted); margin-top:6px; }
.val-gold { color:#7A5C00; }
.val-teal { color:var(--teal); }
.val-red  { color:var(--red); }
.val-blue { color:#1D6EA3; }

.chart-card { background:var(--bg); border-radius:12px; padding:18px 20px; margin-bottom:20px; }
.chart-card-title { font-size:0.72rem; font-weight:600; text-transform:uppercase; letter-spacing:0.5px; color:var(--muted); margin-bottom:14px; }
.chart-wrap { height:190px; position:relative; }
.no-data { text-align:center; padding:50px 20px; color:var(--muted); font-size:0.85rem; }

.table-card { background:var(--bg); border-radius:12px; overflow:hidden; }
.table-card-title { font-size:0.72rem; font-weight:600; text-transform:uppercase; letter-spacing:0.5px; color:var(--muted); padding:14px 20px; background:var(--white); border-bottom:1px solid var(--border); }
table { width:100%; border-collapse:collapse; font-size:0.8rem; background:var(--white); }
th { padding:9px 14px; text-align:left; font-size:0.68rem; font-weight:600; text-transform:uppercase; letter-spacing:0.4px; color:var(--muted); background:#F8F9FB; border-bottom:1px solid var(--border); }
td { padding:9px 14px; border-bottom:1px solid var(--border); }
tr:last-child td { border-bottom:none; }
tr:nth-child(even) td { background:#FAFBFC; }
.grp { display:inline-block; background:var(--blue); color:#fff; border-radius:4px; font-size:0.65rem; font-weight:700; padding:1px 6px; }
.score { font-family:'Courier New',monospace; font-weight:700; font-size:0.88rem; }
.score-pred { color:var(--muted); }
.badge { display:inline-flex; align-items:center; gap:3px; font-size:0.7rem; font-weight:700; padding:2px 8px; border-radius:8px; }
.badge-5 { background:#FDF4E3; color:#8B6900; border:1px solid #F0CC80; }
.badge-2 { background:#E6F4F2; color:#0A6659; border:1px solid #A0DCCC; }
.badge-0 { background:#FDEDF0; color:#A3001A; border:1px solid #FABBC5; }
.badge-p { background:#F0F2F5; color:var(--muted); border:1px solid var(--border); }

.toast { position:fixed; bottom:24px; left:50%; transform:translateX(-50%); background:#1A1A2E; color:#fff; padding:10px 20px; border-radius:20px; font-size:0.8rem; opacity:0; transition:opacity 0.3s; pointer-events:none; z-index:99; }
.toast.show { opacity:1; }
</style>
</head>

function norm(name) { return TEAM_MAP[name] || name; }

function getScore(p1,p2,r1,r2) {
  if (p1===r1 && p2===r2) return 5;
  if (Math.sign(p1-p2)===Math.sign(r1-r2)) return 2;
  return 0;
}

// ═══════════════════════════════════════════════
//  BUILD MATCH DATA
// ═══════════════════════════════════════════════
function buildMatchData(preds, results) {
  return preds.map(pred => {
    const hit = results.find(r =>
      norm(r.home) === pred.t1 && norm(r.away) === pred.t2
    );
    if (hit) {
      return {...pred, r1:hit.r1, r2:hit.r2, pts:getScore(pred.g1,pred.g2,hit.r1,hit.r2), played:true};
    }
    return {...pred, r1:null, r2:null, pts:null, played:false};
  });
}

function renderAllTabs() {
  ['base','conservadora','riesgo'].forEach(k => renderTab(k, buildMatchData(PREDS[k], liveResults)));
}

const charts = {};
const COLORS = {
  base:         {line:'#C9973B', fill:'rgba(201,151,59,0.12)'},
  conservadora: {line:'#007B6E', fill:'rgba(0,123,110,0.12)'},
  riesgo:       {line:'#C8102E', fill:'rgba(200,16,46,0.12)'}
};

function renderChart(key, played) {
  const canvas = document.getElementById(`chart-${key}`);
  if (!canvas || played.length === 0) return;
  if (charts[key]) charts[key].destroy();
  const labels=[], data=[];
  let cum = 0;
  for (const m of played) { cum += m.pts; labels.push(`P${m.p}`); data.push(cum); }
  const c = COLORS[key];
  charts[key] = new Chart(canvas.getContext('2d'), {
    type: 'line',
    data: {labels, datasets:[{
      label:'Pts acumulados', data, borderColor:c.line, backgroundColor:c.fill,
      borderWidth:2.5, pointRadius:4, pointBackgroundColor:c.line,
      pointBorderColor:'#fff', pointBorderWidth:1.5, tension:0.35, fill:true
    }]},
    options: {
      responsive:true, maintainAspectRatio:false,
      plugins:{
        legend:{display:false},
        tooltip:{backgroundColor:'#1A1A2E',titleColor:'#fff',bodyColor:'#ccc',
          padding:10,cornerRadius:8,callbacks:{label:ctx=>` ${ctx.parsed.y} pts`}}
      },
      scales:{
        x:{grid:{color:'rgba(0,0,0,0.05)'},ticks:{color:'#6B7280',font:{size:10},maxTicksLimit:12}},
        y:{grid:{color:'rgba(0,0,0,0.05)'},ticks:{color:'#6B7280',font:{size:10}},min:0}
      }
    }
  });
}

// ═══════════════════════════════════════════════
//  RENDER TAB
// ═══════════════════════════════════════════════
const valClass = {base:'val-gold', conservadora:'val-teal', riesgo:'val-red'};

function fmtDate(iso) {
  const [,m,d] = iso.split('-');
  const months = ['','ene','feb','mar','abr','may','jun','jul','ago','sep','oct','nov','dic'];
  return `${parseInt(d)} ${months[parseInt(m)]}`;
}

function renderTab(key, matchData) {
  // Sort ascending by date, then by partido number within same date
  const sorted = [...matchData].sort((a,b) => a.f.localeCompare(b.f) || a.p - b.p);
  const played   = sorted.filter(m => m.played);
  const totalPts = played.reduce((s,m) => s+m.pts, 0);
  const maxPts   = played.length * 5;
  const pct      = maxPts > 0 ? Math.round(totalPts/maxPts*100) : 0;

  document.getElementById(`pts-${key}`).textContent = `${totalPts} pts`;

  const vc = valClass[key];
  const rows = sorted.map(m => {
    const pts = m.played
      ? (m.pts===5 ? '<span class="badge badge-5">⭐ 5</span>'
        : m.pts===2 ? '<span class="badge badge-2">✓ 2</span>'
        : '<span class="badge badge-0">✗ 0</span>')
      : '<span class="badge badge-p">pendiente</span>';
    const real = m.r1 !== null
      ? `<span class="score">${m.r1} – ${m.r2}</span>`
      : `<span style="color:#CBD5E1">—</span>`;
    return `<tr>
      <td style="white-space:nowrap;color:var(--muted);font-size:0.75rem">${fmtDate(m.f)}</td>
      <td><span class="grp">${m.g}</span></td>
      <td>${m.t1} <span style="color:#CBD5E1">vs</span> ${m.t2}</td>
      <td>${real}</td>
      <td><span class="score score-pred">${m.g1} – ${m.g2}</span></td>
      <td>${pts}</td>
    </tr>`;
  }).join('');

  document.getElementById(`body-${key}`).innerHTML = `
    <div class="stats-row">
      <div class="stat-card card-pts">
        <div class="stat-label">⭐ Puntos obtenidos</div>
        <div class="stat-value ${vc}">${totalPts} <span class="unit">/ ${maxPts} pts posibles</span></div>
        <div class="stat-sub">${played.length} de 72 partidos jugados</div>
      </div>
      <div class="stat-card card-pct">
        <div class="stat-label">📈 Rendimiento</div>
        <div class="stat-value val-blue">${pct}<span class="unit">%</span></div>
        <div class="stat-sub">Sobre el máximo alcanzable (${maxPts} pts)</div>
      </div>
    </div>
    <div class="chart-card">
      <div class="chart-card-title">📊 Puntos acumulados por partido</div>
      ${played.length === 0
        ? '<div class="no-data">Sin partidos terminados — la gráfica aparece aquí</div>'
        : `<div class="chart-wrap"><canvas id="chart-${key}"></canvas></div>`}
    </div>
    <div class="table-card">
      <div class="table-card-title">📋 Predicciones vs Resultados</div>
      <table>
        <thead><tr><th>Fecha</th><th>Grupo</th><th>Partido</th><th>Real</th><th>Predicción</th><th>Pts</th></tr></thead>
        <tbody>${rows}</tbody>
      </table>
    </div>`;

  if (played.length > 0) setTimeout(() => renderChart(key, played), 60);
}

function switchTab(key) {
  ['base','conservadora','riesgo'].forEach(k => {
    document.getElementById(`panel-${k}`).classList.toggle('active', k===key);
    const t = document.getElementById(`tab-${k}`);
    t.className = 'tab' + (k===key ? ` active-${k}` : '');
  });
  setTimeout(() => { if (charts[key]) charts[key].resize(); }, 60);
}

function showToast(msg, duration=3500) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  setTimeout(() => el.classList.remove('show'), duration);
}

  try {
    await window.cowork.runScheduledTask('wc2026-update-scores');
    showToast('✓ Resultados actualizados — recargando...', 3000);
    setTimeout(() => window.location.reload(), 3500);
  } catch(e) {
    showToast('⚠️ No se pudo actualizar. Intenta de nuevo.', 3500);
    btn.disabled = false;
    btn.textContent = '↻ Actualizar';
    document.getElementById('update-time').textContent = `Datos al: ${LAST_UPDATE}`;
  }
}

// ═══════════════════════════════════════════════
//  MAIN
// ═══════════════════════════════════════════════
function init() {
  renderAllTabs();
  document.getElementById('update-time').textContent = `Datos al: ${LAST_UPDATE}`;
}

init();
</script>
